# MRT Turnout Monitoring — Mosquitto broker config.
# Mounted into the mosquitto container as /mosquitto/config/mosquitto.conf.

# Default listener bound on the docker bridge.
listener 1883

# Persistence for retained messages and queued QoS>=1 deliveries.
persistence true
persistence_location /mosquitto/data/

# Logs.
log_dest stdout
log_type error
log_type warning
log_type notice

# --- Auth ---
# Disable anonymous; require credentials via password file.
# Generate the password file once:
#   docker compose run --rm mosquitto mosquitto_passwd -c -b /mosquitto/config/passwd ${MQTT_USERNAME} ${MQTT_PASSWORD}
# Then keep this file mounted alongside mosquitto.conf.
allow_anonymous false
password_file /mosquitto/config/passwd
